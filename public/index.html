<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reference Clipper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="composer" aria-label="Создание фрагмента">
        <header class="topbar">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="title-block">
            <h1>Reference Clipper</h1>
          </div>
          <div id="status" class="status">Проверка</div>
        </header>

        <section id="introState" class="command-panel" aria-label="Источник">
          <div class="intro-copy" aria-label="Поддерживаемые источники">
            <p>You can clip and export any<br>fragment from videos from</p>
            <div class="source-badges">
              <span><i aria-hidden="true">▶</i>YouTube</span>
              <span><i aria-hidden="true">Be</i>Behance</span>
              <span><i aria-hidden="true">P</i>Pinterest</span>
              <span><i aria-hidden="true">◎</i>Instagram</span>
            </div>
          </div>
          <div class="paste-row">
            <input id="url" type="url" placeholder="Paste a Behance, Vimeo or YouTube URL" autocomplete="off" required>
            <button type="button" id="pasteFromClipboardBtn" class="paste-cta">Click to paste</button>
          </div>
          <div id="commandMessage" class="command-message" aria-live="polite"></div>
        </section>

        <section id="loadingState" class="loading-state" hidden aria-live="polite" aria-busy="true">
          <div class="loading-spinner" aria-hidden="true"></div>
          <div>
            <strong id="loadingTitle">Загрузка</strong>
            <p id="loadingDetail">Источник готовится.</p>
          </div>
        </section>

        <form id="clipForm" class="clip-card">
          <div class="source-panel panel">
            <label class="toggle-field full" for="includeEmbedded">
              <span>
                <strong>Embedded video</strong>
              </span>
              <input id="includeEmbedded" type="checkbox" checked>
              <i aria-hidden="true"></i>
            </label>

            <div id="sourcePreview" class="source-preview" hidden>
              <img id="thumbnail" alt="">
              <div>
                <strong id="sourceTitle">Источник</strong>
                <small id="sourceMeta">00:30</small>
              </div>
            </div>

            <div id="videoOptions" class="video-options" hidden></div>
          </div>

          <section class="timeline-block panel" aria-label="Выбор фрагмента">
            <div class="timeline-head">
              <strong id="rangeLabel">00:00.0 - 00:05.0</strong>
            </div>

            <div class="segment-preview">
              <div id="timeBubble" class="time-bubble">00:00.0</div>
              <button type="button" class="play-preview" aria-label="Предпросмотр фрагмента"></button>
              <div id="filmstrip" class="filmstrip">
                <div id="filmFrames" class="film-frames" aria-hidden="true"></div>
                <div id="previewSelectedRange" class="preview-selected-range">
                  <span class="range-handle left" data-edge="start"></span>
                  <span class="range-handle right" data-edge="end"></span>
                </div>
              </div>
            </div>

            <video id="previewVideo" class="preview-video" playsinline muted controls hidden></video>

            <div class="range-wrap" hidden>
              <div id="selectedRange" class="selected-range"></div>
              <input id="startRange" type="range" min="0" max="30" value="0" step="0.1">
              <input id="endRange" type="range" min="0" max="30" value="5" step="0.1">
            </div>

            <div class="time-inputs">
              <label class="field">
                <span>Start</span>
                <input id="start" type="text" value="00:00.0">
              </label>
              <label class="field">
                <span>End</span>
                <input id="end" type="text" value="00:05.0">
              </label>
              <label class="field">
                <span>Length</span>
                <input id="duration" type="text" value="5.0 сек" readonly>
              </label>
            </div>
          </section>

          <div class="export-panel panel">
            <label class="field full">
              <span>Name</span>
              <input id="title" type="text" placeholder="Например: kinetic typography / logo reveal" required>
            </label>

            <label class="field full">
              <span>Tags</span>
              <input id="tagInput" type="text" list="tagSuggestions" placeholder="car, ui, motion">
              <datalist id="tagSuggestions"></datalist>
            </label>
            <div id="tagChips" class="tag-chips" aria-label="Выбранные теги"></div>

            <label class="field">
              <span>Quality</span>
              <select id="quality">
                <option value="720">720p, оптимально</option>
                <option value="480">480p, быстрее</option>
                <option value="1080">1080p</option>
                <option value="source">Исходное</option>
              </select>
            </label>
            <button type="submit" id="saveBtn">Сохранить фрагмент</button>
          </div>
        </form>
      </section>

      <aside class="library" aria-label="Экспорт">
        <header>
          <div>
            <h2>Сохранение</h2>
          </div>
          <button type="button" id="refreshBtn" aria-label="Статус сохранения">↻</button>
        </header>
        <div id="message" class="message"></div>
        <div id="clips" class="clips"></div>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
